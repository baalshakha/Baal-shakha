<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>बाल शाखा भोजन कैलकुलेटर</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6ff;
      padding: 30px;
    }

    .calculator {
      max-width: 520px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      color: #222;
    }

    label { 
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    small {
      color: gray;
      display: block;
      margin-top: 4px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #4a67ff;
      color: white;
      border: none;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #3248d6;
    }

    .result {
      margin-top: 25px;
      background: #eef2ff;
      padding: 15px;
      border-radius: 10px;
    }

    ul {
      padding-left: 20px;
    }
    @media only screen and (max-width: 749px) {
      .calculator {
          max-width: 100%;
      }
    }
  </style>
</head>

<body>

<div class="calculator">
  <h2>🍲 बाल शाखा भोजन कैलकुलेटर</h2>

  <!-- Food Type -->
  <label>नाश्ता / भोजन का प्रकार</label>
  <select id="foodType">
    <option value="poha">पोहा</option>
    <option value="upma">उपमा</option>
    <option value="khichdi">खिचड़ी</option>
  </select>
  <small>जिस भोजन की मात्रा निकालनी है उसे चुनें</small>

  <!-- Per Person Quantity -->
  <label>एक व्यक्ति औसतन कितना खाएगा? (ग्राम)</label>
  <input type="number" id="perPerson" placeholder="उदाहरण: 150">
  <small>आप अपने अनुमान के अनुसार ग्राम भरें</small>

  <!-- People Count -->
  <label>कुल कितने लोग हैं?</label>
  <input type="number" id="peopleCount" placeholder="उदाहरण: 50">
  <small>कुल उपस्थित लोगों की संख्या डालें</small>

  <button onclick="calculateFood()">मात्रा निकालें</button>

  <!-- Output -->
  <div class="result" id="output" style="display:none;"></div>
</div>

<script>
  function calculateFood() {
    let food = document.getElementById("foodType").value;
    let perPerson = parseInt(document.getElementById("perPerson").value);
    let people = parseInt(document.getElementById("peopleCount").value);

    if (!perPerson || !people) {
      alert("कृपया सभी जानकारी भरें!");
      return;
    }

    let totalFood = perPerson * people;

    let ingredients = {};

    // Ingredients Ratio (Approx)
    if (food === "poha") {
      ingredients = {
        "पोहा": totalFood,
        "प्याज": totalFood * 0.10,
        "तेल": totalFood * 0.05,
        "मूंगफली": totalFood * 0.07,
        "मसाले": totalFood * 0.02,
        "नींबू": totalFood * 0.03
      };
    }

    if (food === "upma") {
      ingredients = {
        "रवा": totalFood,
        "प्याज": totalFood * 0.08,
        "तेल": totalFood * 0.04,
        "सब्जियाँ": totalFood * 0.10,
        "मसाले": totalFood * 0.02
      };
    }

    if (food === "khichdi") {
      ingredients = {
        "चावल": totalFood * 0.60,
        "दाल": totalFood * 0.40,
        "घी": totalFood * 0.05,
        "मसाले": totalFood * 0.02
      };
    }

    // Output Show
    let outputDiv = document.getElementById("output");
    outputDiv.style.display = "block";

    let html = `<h3>✅ कुल आवश्यक सामग्री:</h3>`;
    html += `<p><b>कुल भोजन मात्रा:</b> ${totalFood} ग्राम</p>`;
    html += `<ul>`;

    for (let item in ingredients) {
      html += `<li>${item}: ${ingredients[item].toFixed(0)} ग्राम</li>`;
    }

    html += `</ul>`;
    html += `<p style="color:gray; font-size:14px;">
      * यह मात्रा औसत अनुमान पर आधारित है। आप अपने अनुसार बदल सकते हैं।
    </p>`;

    outputDiv.innerHTML = html;
  }
</script>

</body>
</html>
